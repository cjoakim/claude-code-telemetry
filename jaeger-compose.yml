# Usage:
#   docker compose -f jaeger-compose.yml up
#   docker compose -f jaeger-compose.yml down
#
# Ports:
#   4317: gRPC OTLP
#   4318: HTTP OTLP (Claude Code)
#   16686: Jaeger UI
#
# Chris Joakim, 2026

services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "4317:4317"
      - "4318:4318"
      - "16686:16686"
