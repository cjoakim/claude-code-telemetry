# Usage:
#   docker compose -f otel-collector.yml up
#   docker compose -f otel-collector.yml down
#
# Ports:
#   4317: gRPC OTLP
#   4318: HTTP OTLP (Claude Code)
#   55679: zpages extension
#
# Chris Joakim, 2026

services:
  otel-collector:
    image: otel/opentelemetry-collector:0.154.0
    container_name: otel-collector
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:55679:55679"
